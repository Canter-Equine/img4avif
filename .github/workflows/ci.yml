name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: lint-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (all targets, deny warnings)
        run: cargo clippy --all-targets -- -D warnings

  # ── Build & test on all three platforms ──────────────────────────────────
  test:
    name: Test (${{ matrix.os }} / Rust ${{ matrix.rust }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable]
        include:
          # Verify MSRV on Linux only (saves CI minutes).
          - os: ubuntu-latest
            rust: "1.70"

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust ${{ matrix.rust }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: test-${{ matrix.os }}-${{ matrix.rust }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build (default features)
        run: cargo build --release

      - name: Run tests
        run: cargo test

      - name: Run memory guard smoke test
        run: cargo test --test memory_stress memory_guard_unlimited_always_passes

  # ── Documentation ─────────────────────────────────────────────────────────
  docs:
    name: Docs
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: cargo doc (deny warnings)
        run: RUSTDOCFLAGS="-D warnings" cargo doc --no-deps

  # ── Binary size check (Linux only) ───────────────────────────────────────
  binary-size:
    name: Binary size check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cargo build --release

      - name: Check .rlib size < 5 MB
        run: |
          RLIB=$(find target/release -name "libimg2avif*.rlib" | head -1)
          if [ -z "$RLIB" ]; then
            echo "No .rlib found — skipping size check"
            exit 0
          fi
          SIZE=$(stat -c%s "$RLIB")
          echo "rlib size: $((SIZE / 1024)) KB"
          if [ "$SIZE" -gt $((5 * 1024 * 1024)) ]; then
            echo "ERROR: rlib $((SIZE / 1024)) KB exceeds 5 MB limit"
            exit 1
          fi

  # ── Security audit ───────────────────────────────────────────────────────
  audit:
    name: Security audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: cargo audit
        run: cargo audit

  # ── Memory stress test (Linux, slow) ─────────────────────────────────────
  memory-stress:
    name: 50 MP memory stress test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Run 50 MP stress test
        run: cargo test --test memory_stress -- --ignored --nocapture

  # ── Convert example files to AVIF ────────────────────────────────────────
  convert-examples:
    name: Convert examples/ to AVIF
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: convert-examples-${{ hashFiles('**/Cargo.lock') }}

      - name: Run convert_examples (release build for speed)
        run: cargo run --release --example convert_examples

      - name: Verify outputs were created
        run: |
          echo "AVIF outputs in examples/out/:"
          ls -lh examples/out/
          # Every .jpg / .png / .webp in examples/ must have a corresponding
          # .avif in examples/out/.  The check ignores non-image files.
          failed=0
          for src in examples/*.jpg examples/*.jpeg examples/*.png examples/*.webp; do
            [ -f "$src" ] || continue
            base=$(basename "$src")
            out="examples/out/${base}.avif"
            if [ -f "$out" ]; then
              echo "  ✓  $base  →  $out"
            else
              echo "  ✗  MISSING: $out"
              failed=$((failed + 1))
            fi
          done
          exit "$failed"
