name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
  pull_request:
    branches: ["**"]
    paths-ignore:
      - "**/*.md"
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: lint-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (all targets, deny warnings)
        run: cargo clippy --all-targets -- -D warnings

  # ── Main test suite (Linux / stable) ─────────────────────────────────────
  test:
    name: Test (Linux / Rust stable)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: test-ubuntu-latest-stable-${{ hashFiles('**/Cargo.lock') }}

      - name: Run unit and integration tests
        run: cargo test --lib --tests

  # ── MSRV smoke coverage (Linux only) ─────────────────────────────────────
  msrv:
    name: MSRV (Rust 1.85)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.85
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: test-ubuntu-latest-1.85-${{ hashFiles('**/Cargo.lock') }}

      - name: Run lightweight MSRV checks
        run: cargo test --lib

  # ── Documentation ─────────────────────────────────────────────────────────
  docs:
    name: Docs
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Run doctests
        run: cargo test --doc

      - name: cargo doc (deny warnings)
        run: RUSTDOCFLAGS="-D warnings" cargo doc --no-deps

  # ── Binary size check (Linux only) ───────────────────────────────────────
  binary-size:
    name: Binary size check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cargo build --release

      - name: Check .rlib size < 5 MB
        run: |
          RLIB=$(find target/release -name "libimg2avif*.rlib" | head -1)
          if [ -z "$RLIB" ]; then
            echo "No .rlib found — skipping size check"
            exit 0
          fi
          SIZE=$(stat -c%s "$RLIB")
          echo "rlib size: $((SIZE / 1024)) KB"
          if [ "$SIZE" -gt $((5 * 1024 * 1024)) ]; then
            echo "ERROR: rlib $((SIZE / 1024)) KB exceeds 5 MB limit"
            exit 1
          fi

  # ── Security audit ───────────────────────────────────────────────────────
  audit:
    name: Security audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: cargo audit
        run: cargo audit

  # ── Memory stress test (Linux, slow) ─────────────────────────────────────
  memory-stress:
    name: 50 MP memory stress test
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: memory-stress-${{ hashFiles('**/Cargo.lock') }}

      - name: Run 50 MP stress test
        run: cargo test --test memory_stress -- --ignored --nocapture
