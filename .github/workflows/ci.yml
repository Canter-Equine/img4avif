name: CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
  pull_request:
    branches: ["**"]
    paths-ignore:
      - "**/*.md"
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-lint-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (all targets, deny warnings)
        run: cargo clippy --all-targets -- -D warnings

  test:
    name: Test (Rust stable)
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-stable-${{ hashFiles('**/Cargo.lock') }}

      - name: Run unit and integration tests
        run: cargo test --lib --tests

  msrv:
    name: MSRV (Rust 1.85)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.85
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-1.85-${{ hashFiles('**/Cargo.lock') }}

      - name: Compile unit and integration tests on MSRV
        run: cargo test --lib --tests --no-run

  docs:
    name: Docs
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Run doctests
        run: cargo test --doc

      - name: cargo doc (deny warnings)
        run: RUSTDOCFLAGS="-D warnings" cargo doc --no-deps

  binary-size:
    name: Binary size check
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cargo build --release

      - name: Check .rlib size < 5 MB
        run: |
          RLIB=$(find target/release -name "libimg2avif*.rlib" | head -1)
          if [ -z "$RLIB" ]; then
            echo "No .rlib found — skipping size check"
            exit 0
          fi
          SIZE=$(stat -c%s "$RLIB")
          echo "rlib size: $((SIZE / 1024)) KB"
          if [ "$SIZE" -gt $((5 * 1024 * 1024)) ]; then
            echo "ERROR: rlib $((SIZE / 1024)) KB exceeds 5 MB limit"
            exit 1
          fi

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install --locked cargo-audit

      - name: cargo audit
        run: cargo audit

  compile-aarch64:
    name: Cross-compile check (aarch64)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Add aarch64 target
        run: rustup target add aarch64-unknown-linux-gnu

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-stable-aarch64-${{ hashFiles('**/Cargo.lock') }}

      - name: Cross-compile (release, no run)
        run: cargo build --target aarch64-unknown-linux-gnu --release --no-run

  memory-stress:
    name: 50 MP memory stress test
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: memory-stress-${{ hashFiles('**/Cargo.lock') }}

      - name: Run 50 MP stress test
        run: cargo test --test memory_stress -- --ignored --nocapture
